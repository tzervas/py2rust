# Fleet security lint/scan — self-hosted. Badge reflects honest job status on trunk.
name: fleet-security

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

concurrency:
  group: fleet-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          set -euo pipefail
          if ! command -v gitleaks >/dev/null 2>&1; then
            if [ -f "$HOME/.local/bin/gitleaks" ]; then
              export PATH="$HOME/.local/bin:$PATH"
            else
              echo "gitleaks not found, downloading binary..."
              VERSION="8.18.2"
              curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
              tar -xzf gitleaks.tar.gz gitleaks
              chmod +x gitleaks
              mkdir -p "$HOME/.local/bin"
              mv gitleaks "$HOME/.local/bin/"
              export PATH="$HOME/.local/bin:$PATH"
              rm -f gitleaks.tar.gz
            fi
          fi
          gitleaks detect --source . --verbose --redact

  trivy-fs:
    name: trivy filesystem (vuln+secret+license)
    runs-on: [self-hosted, linux, x64, podman]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs
        run: |
          set -euo pipefail
          if ! command -v trivy >/dev/null 2>&1; then
            echo "trivy missing — advisory skip (continue-on-error)"
            exit 0
          fi
          trivy fs --scanners vuln,secret,license \
            --severity HIGH,CRITICAL \
            --skip-dirs .git --skip-dirs target --skip-dirs node_modules --skip-dirs .venv \
            --exit-code 1 \
            .

name: CI

on:
  push:
    branches:
      - main
      - dev
      - develop
  pull_request:
    branches:
      - main
      - dev
      - develop
  workflow_dispatch:

jobs:
  rust:
    name: cargo check + test
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            if [ -f "$HOME/.cargo/bin/cargo" ]; then
              export PATH="$HOME/.cargo/bin:$PATH"
              echo "$HOME/.cargo/bin" >> $GITHUB_PATH
            else
              echo "rustup/cargo not found, installing..."
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              export PATH="$HOME/.cargo/bin:$PATH"
              echo "$HOME/.cargo/bin" >> $GITHUB_PATH
            fi
          fi
          rustc --version
          cargo --version

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

      - name: CLI smoke
        run: |
          cargo run -p py2rust -- version
          printf 'def add(x: int, y: int) -> int:\n    return x + y\n' > /tmp/p25_smoke.py
          cargo run -p py2rust -- analyze /tmp/p25_smoke.py
          cargo run -p py2rust -- transpile /tmp/p25_smoke.py -o /tmp/p25_smoke.rs
          test -f /tmp/p25_smoke.rs
          test -f /tmp/p25_smoke.gap.json
